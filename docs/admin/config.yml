backend:
  name: git-gateway
  branch: main

media_folder: "docs/images"
public_folder: "/images"

media_library:
  name: uploadcare

collections:
  - name: "pages"
    label: "Seiten"
    # Mit 'folder' statt 'files', damit man neue Texte erstellen kann
    folder: "docs/content"
    create: true        # erlaubt neue Einträge
    slug: "{{slug}}"    # Dateiname wird aus Titel generiert
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Text", name: "body", widget: "markdown" }

